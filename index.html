<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NAATI CCL · Urdu Mock Test Simulator</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;min-height:100vh;padding-bottom:2rem;}
  input,textarea,button{font-family:inherit;}
  input[type=text],textarea{width:100%;padding:10px 12px;border:1px solid #ccd3dc;border-radius:8px;font-size:14px;outline:none;}
  input[type=text]:focus,textarea:focus{border-color:#185FA5;}
  audio{width:100%;height:40px;border-radius:6px;}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes wave{0%{transform:scaleY(0.25)}100%{transform:scaleY(1)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes voiceBar{0%{height:6px}100%{height:var(--h)}}
  .spinner{width:32px;height:32px;border:3px solid #dde3ec;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  .wave-bar{width:4px;border-radius:2px;animation:wave 0.9s ease-in-out infinite alternate;}
  .score-bar-fill{height:100%;border-radius:3px;transition:width 0.6s;}
</style>
</head>
<body>

<div id="app"></div>

<script>
const MODEL = "claude-sonnet-4-5";
const NAATI_TOPICS = [
  "Health – Doctor's Appointment for Diabetes Management",
  "Health – Mental Health Assessment at Community Clinic",
  "Health – Pharmacy Prescription and Medication Advice",
  "Health – Antenatal Check-up at Hospital",
  "Education – Primary School Enrolment Meeting",
  "Education – Parent-Teacher Interview about Child's Progress",
  "Education – TAFE Enrolment and Course Selection",
  "Housing – Rental Application and Tenancy Agreement",
  "Housing – Bond Refund Dispute with Property Manager",
  "Housing – Public Housing Application Interview",
  "Legal – Police Interview and Rights Explanation",
  "Legal – Family Court Mediation Briefing",
  "Legal – Community Legal Centre Advice Session",
  "Social Services – Centrelink Benefits Application",
  "Social Services – Child Protection Interview",
  "Social Services – Aged Care Assessment",
  "Immigration – Visa Application Interview",
  "Immigration – Citizenship Test Preparation",
  "Employment – Job Interview Preparation with Job Agency",
];

const SYS = `You are a NAATI CCL exam dialogue generator. Return ONLY valid JSON. No markdown, no code fences, no explanation.
Generate a realistic NAATI CCL dialogue with EXACTLY 10 segments alternating English then Urdu.
TRANSLATION RULES — CRITICAL:
- Every single word in the original MUST be translated. Never skip names, places, medical terms, numbers, or any detail.
- Only keep a word in English if it has NO Urdu equivalent and is universally used as-is (e.g. "Medicare", "Centrelink", "TAFE").
- All other words must be in proper Urdu or Roman Urdu.
Segment rules:
- English segments: 25-35 words, natural spoken Australian English
- Urdu segments:
  - "text": ROMAN URDU phonetic Latin (e.g. "Mujhe doctor se milna hai")
  - "urdu_script": same in proper Urdu script
- "translation": COMPLETE — English→Roman Urdu or Urdu→English, every word
- "context": 2-3 sentence English briefing as in real NAATI CCL test
Return ONLY this JSON:
{"title":"string","english_speaker":"string","urdu_speaker":"string","context":"string","segments":[{"id":1,"lang":"en","speaker_label":"string","text":"string","translation":"string"},{"id":2,"lang":"ur","speaker_label":"string","text":"string","urdu_script":"string","translation":"string"}]}`;

const SCORE_SYS = `You are a NAATI CCL exam marker. Score the candidate's interpretation.
NAATI CCL marking per segment (total 5 marks):
- Accuracy (2 marks): All key ideas conveyed correctly
- Completeness (1 mark): Nothing important omitted
- Language & Expression (1 mark): Natural and fluent language
- Terminology (1 mark): Correct domain-specific terms
Return ONLY this JSON, no markdown:
{"score":3,"max":5,"accuracy":1,"completeness":1,"language":1,"terminology":0,"feedback":"One specific constructive sentence."}`;

// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  phase: "input", // input|generating|context|test|done
  topic: "", dialogue: null, segIdx: 0, segPhase: "idle",
  apiError: "", scores: {}, elapsed: 0, timerOn: false, paused: false,
  ttsActive: false, retryCount: 0,
  hasUrduVoice: false, voicesLoaded: false,
  contextPlayed: false, contextPlaying: false,
  customApiKey: "", customApiKeyInput: "", showKeyInput: false, showApiKey: false, keyError: "",
  micReady: false, micChecked: false,
  recording: false, audioUrl: null, audioBlob: null, micStatus: "idle",
  liveTranscript: "",
  processing: false, transcript: "", segScore: null,
  // voice visualiser
  voiceLevels: new Array(20).fill(0),
};

let timerInterval = null;
let mediaRecorder = null;
let audioChunks = [];
let analyserNode = null;
let audioCtxViz = null;
let vizAnimId = null;
let audioCtxBeep = null;

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ─── Speech Synthesis ────────────────────────────────────────────────────────
function speakEN(text, cb) {
  const synth = window.speechSynthesis;
  if (!synth) { cb&&cb(); return; }
  synth.cancel();
  setTimeout(() => {
    const voices = synth.getVoices();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "en-AU"; utt.rate = 0.86; utt.pitch = 1.0;
    const v = voices.find(v=>v.lang==="en-AU"&&/catherine|karen|lee/i.test(v.name)) ||
      voices.find(v=>v.lang==="en-AU") || voices.find(v=>v.lang.startsWith("en-GB")) ||
      voices.find(v=>v.lang.startsWith("en"));
    if (v) { utt.voice=v; utt.lang=v.lang; }
    const wc = text.split(" ").length;
    let started=false,retried=false,wd=null;
    utt.onstart=()=>{ started=true; wd=setTimeout(()=>{synth.cancel();cb&&cb();},Math.max(20000,wc*1200)); };
    utt.onend=()=>{ clearTimeout(wd); if(!started&&!retried){retried=true;setTimeout(()=>speakEN(text,cb),500);return;} cb&&cb(); };
    utt.onerror=(e)=>{ clearTimeout(wd); if(e.error==="interrupted"||e.error==="canceled")return; if(!retried){retried=true;setTimeout(()=>speakEN(text,cb),500);} };
    synth.speak(utt);
  }, 150);
}

function speakUR(text, cb) {
  const synth = window.speechSynthesis;
  if (!synth) { cb&&cb(); return; }
  synth.cancel();
  setTimeout(() => {
    const voices = synth.getVoices();
    const utt = new SpeechSynthesisUtterance(text);
    const ur = voices.find(v=>v.lang==="ur-PK")||voices.find(v=>v.lang.startsWith("ur"));
    const sa = voices.find(v=>v.lang==="hi-IN")||voices.find(v=>v.lang==="en-IN")||
      voices.find(v=>/heera|ravi/i.test(v.name))||voices.find(v=>v.lang.startsWith("en"));
    const chosen = ur||sa;
    if (chosen){utt.voice=chosen;} utt.lang=chosen?.lang||"en-IN"; utt.rate=0.75; utt.pitch=1.05;
    const wc=text.split(" ").length;
    let started=false,retried=false,wd=null;
    utt.onstart=()=>{ started=true; wd=setTimeout(()=>{synth.cancel();cb&&cb();},Math.max(20000,wc*1200)); };
    utt.onend=()=>{ clearTimeout(wd); if(!started&&!retried){retried=true;setTimeout(()=>speakUR(text,cb),600);return;} cb&&cb(); };
    utt.onerror=(e)=>{ clearTimeout(wd); if(e.error==="interrupted"||e.error==="canceled")return; if(!retried){retried=true;setTimeout(()=>speakUR(text,cb),600);} };
    synth.speak(utt);
  }, 150);
}

function doSpeak(text, lang, cb) {
  setState({ttsActive:true});
  const fn = lang==="ur" ? speakUR : speakEN;
  fn(text, ()=>{ setState({ttsActive:false}); cb&&cb(); });
}

function beep() {
  try {
    if (!audioCtxBeep) audioCtxBeep = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtxBeep.state==="suspended") audioCtxBeep.resume();
    const o=audioCtxBeep.createOscillator(), g=audioCtxBeep.createGain();
    o.connect(g); g.connect(audioCtxBeep.destination);
    o.frequency.value=880; o.type="sine";
    g.gain.setValueAtTime(0.3,audioCtxBeep.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtxBeep.currentTime+0.45);
    o.start(audioCtxBeep.currentTime); o.stop(audioCtxBeep.currentTime+0.45);
  } catch(e){}
}

// ─── Timer ───────────────────────────────────────────────────────────────────
function startTimer() { setState({elapsed:0,timerOn:true,paused:false}); timerInterval=setInterval(()=>setState({elapsed:state.elapsed+1}),1000); }
function stopTimer() { setState({timerOn:false}); clearInterval(timerInterval); }
function resetTimer() { stopTimer(); setState({elapsed:0,paused:false}); }
function fmt(s){ return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }

// ─── Voice Visualiser ────────────────────────────────────────────────────────
function startViz(stream) {
  state.voiceLevels = new Array(20).fill(128);
}
function stopViz() {
  if(vizAnimId) cancelAnimationFrame(vizAnimId);
  analyserNode=null; audioCtxViz=null;
  state.voiceLevels = new Array(20).fill(0);
}
// ─── Microphone ──────────────────────────────────────────────────────────────
async function initMic() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=>t.stop());
    setState({micReady:true,micChecked:true});
  } catch(e) {
    setState({micReady:false,micChecked:true});
  }
}

async function startRecording() {
  setState({micStatus:"requesting", liveTranscript:""});
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    setState({micStatus:"granted",micReady:true,recording:true});
    startViz(stream);
    audioChunks=[];
    const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":
      MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/ogg";
    mediaRecorder = new MediaRecorder(stream,{mimeType:mime});
    mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks,{type:mime});
      const url=URL.createObjectURL(blob);
      setState({audioBlob:blob,audioUrl:url});
      stream.getTracks().forEach(t=>t.stop());
      stopViz();
    };
    mediaRecorder.start(200);
    if(window.SpeechRecognition||window.webkitSpeechRecognition) {
      const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
      const rec = new SR();
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = state.dialogue?.segments[state.segIdx]?.lang==="ur" ? "en-US" : "en-AU";
      rec.onresult = e => {
        let t = "";
        for(let i=0;i<e.results.length;i++) t += e.results[i][0].transcript;
        state.liveTranscript = t;
        const el = document.getElementById("liveTranscriptEl");
        if(el) el.textContent = t;
      };
      rec.start();
      window._naatiRec = rec;
    }
  } catch(e) {
    setState({micStatus:"denied",micReady:false});
    stopViz();
  }
}
function stopRecording() {
  if(window._naatiRec) { try{window._naatiRec.stop();}catch(e){} window._naatiRec=null; }
  stopTimer();
  const tx = state.liveTranscript || "";
  if(mediaRecorder&&state.recording) {
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, {type: mediaRecorder.mimeType||"audio/webm"});
      const url = URL.createObjectURL(blob);
      state.audioBlob = blob;
      state.audioUrl = url;
      setState({segPhase:"answered", transcript: tx, audioUrl: url, audioBlob: blob, recording:false});
      if(tx) setTimeout(()=>scoreOnly(tx), 500);
    };
    mediaRecorder.stop();
  } else {
    setState({segPhase:"answered", transcript: tx, recording:false});
    if(tx) setTimeout(()=>scoreOnly(tx), 500);
  }
}
// ─── API ─────────────────────────────────────────────────────────────────────
async function callAPI(body, attempt=1) {
  const headers = { "Content-Type": "application/json" };
  if (state.customApiKey) headers["x-api-key"] = state.customApiKey;
  try {
    const res = await fetch("https://naatipractice.yaali-sm.workers.dev", {
      method: "POST",
      headers,
      body: JSON.stringify(body),
    });
   if (res.status===529||res.status===503) {
      if (attempt<4) { setState({retryCount:attempt}); await new Promise(r=>setTimeout(r,attempt*3000)); return callAPI(body,attempt+1); }
      throw new Error("__BUSY__");
    }
    if (res.status===429) throw new Error("__LIMIT__");
    if (res.status===401) throw new Error("__BADKEY__");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res;
  } catch(e) {
    if (e.message==="__BUSY__"||e.message==="__LIMIT__"||e.message==="__BADKEY__") throw e;
    throw new Error("Failed to connect — please check your connection.");
  }
}

async function generateDialogue() {
  if(!state.topic.trim()) return;
  setState({phase:"generating",apiError:"",scores:{},retryCount:0});
  try {
    const res=await callAPI({model:MODEL,max_tokens:4000,system:SYS,messages:[{role:"user",content:`NAATI CCL dialogue. Topic: "${state.topic.trim()}"`}]});
    const data=await res.json();
    if(data.error){
      if(data.error.type==="authentication_error") throw new Error("__BADKEY__");
      if(data.error.type==="rate_limit_error") throw new Error("__LIMIT__");
      throw new Error(data.error.message);
    }
    const raw=(data.content||[]).map(c=>c.text||"").join("").trim();
    const json=raw.replace(/^```[\w]*\n?/,"").replace(/```\s*$/,"").trim();
    const parsed=JSON.parse(json);
    if(!parsed.segments||parsed.segments.length<4) throw new Error("Incomplete dialogue");
    setState({dialogue:parsed,segIdx:0,segPhase:"idle",contextPlayed:false,contextPlaying:false,phase:"context"});
    resetTimer();
  } catch(e){
    if(e.message==="__LIMIT__"||e.message==="__BUSY__"){setState({showKeyInput:true,apiError:e.message==="__LIMIT__"?"Usage limit reached.":"Server busy — try again or use different key."});}
    else if(e.message==="__BADKEY__"){setState({keyError:"Invalid API key.",showKeyInput:true});}
    else setState({apiError:(e.message||"Unknown")+" — please try again."});
    setState({phase:"input"});
  }
}

async function autoScore() {
  const blob=state.audioBlob, seg=state.dialogue?.segments[state.segIdx];
  if(!blob||!seg){return;}
  setState({processing:true,transcript:"",segScore:null});
  try {
    const ab=await blob.arrayBuffer();
    const bytes=new Uint8Array(ab);
    let bin=""; for(let i=0;i<bytes.byteLength;i++) bin+=String.fromCharCode(bytes[i]);
    const b64=btoa(bin);
    const isUrdu=seg.lang==="ur";
    const prompt=isUrdu
      ?`This is a NAATI CCL exam candidate interpreting an Urdu segment into English. Transcribe exactly what they said in English. Original Urdu for reference: "${seg.text}". Return transcription only.`
      :`This is a NAATI CCL exam candidate interpreting an English segment into Urdu. Transcribe what they said in Roman Urdu. Original English for reference: "${seg.text}". Return transcription only.`;
    const r1 = await callAPI({model:MODEL,max_tokens:500,messages:[{role:"user",content:[{type:"text",text:prompt}]}]});
    const d1=await r1.json();
    let tx=(d1.content||[]).map(c=>c.text||"").join("").trim();
    if(!tx||tx.length<2) tx="(Could not transcribe)";
    setState({transcript:tx});
    if(!tx.startsWith("(")) {
      const r2 = await callAPI({model:MODEL,max_tokens:300,system:SCORE_SYS,messages:[{role:"user",content:`Original: "${seg.text}"\nModel answer: "${seg.translation}"\nCandidate: "${tx}"`}]});
      const d2=await r2.json();
      const raw=(d2.content||[]).map(c=>c.text||"").join("").trim().replace(/^```[\w]*\n?/,"").replace(/```\s*$/,"").trim();
      try {
        const sc=JSON.parse(raw);
        setState({segScore:sc,scores:{...state.scores,[state.segIdx]:sc}});
      } catch(e){}
    }
  } catch(e){ setState({transcript:"(Processing failed)"}); }
  setState({processing:false});
}
async function scoreOnly(tx) {
  const seg = state.dialogue?.segments[state.segIdx];
  if(!seg||!tx) return;
  setState({processing:true, segScore:null});
  try {
    const r = await callAPI({model:MODEL,max_tokens:300,system:SCORE_SYS,
      messages:[{role:"user",content:`Original: "${seg.text}"\nModel answer: "${seg.translation}"\nCandidate: "${tx}"`}]});
    const d = await r.json();
    const raw = (d.content||[]).map(c=>c.text||"").join("").trim().replace(/^```[\w]*\n?/,"").replace(/```\s*$/,"").trim();
    try {
      const sc = JSON.parse(raw);
      setState({segScore:sc, scores:{...state.scores,[state.segIdx]:sc}});
    } catch(e){}
  } catch(e){}
  setState({processing:false});
}
function nextSegment() {
  window.speechSynthesis?.cancel();
  resetTimer();
  setState({audioBlob:null,audioUrl:null,transcript:"",segScore:null,recording:false,micStatus:"idle",processing:false,voiceLevels:new Array(20).fill(0)});
  if(state.segIdx+1>=state.dialogue.segments.length) setState({phase:"done"});
  else setState({segIdx:state.segIdx+1,segPhase:"idle"});
}

function restart() {
  window.speechSynthesis?.cancel();
  resetTimer();
  setState({phase:"input",dialogue:null,segIdx:0,segPhase:"idle",apiError:"",scores:{},ttsActive:false,contextPlayed:false,contextPlaying:false,audioBlob:null,audioUrl:null,transcript:"",segScore:null,recording:false,micStatus:"idle",processing:false,voiceLevels:new Array(20).fill(0)});
}

function calcFinal() {
  const vals=Object.values(state.scores);
  if(!vals.length||!state.dialogue) return null;
  const total=vals.reduce((a,b)=>a+(b.score||0),0);
  const max=state.dialogue.segments.length*5;
  return {pct:Math.round((total/max)*100),total,max};
}

// ─── Voices ──────────────────────────────────────────────────────────────────
function checkVoices() {
  const v=window.speechSynthesis?.getVoices()||[];
  if(v.length>0) setState({hasUrduVoice:v.some(v=>v.lang.startsWith("ur")),voicesLoaded:true});
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function h(tag,attrs={},children=[]) {
  const el=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function") el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className") el.className=v;
    else if(k==="htmlFor") el.htmlFor=v;
    else el.setAttribute(k,v);
  }
  for(const c of children) {
    if(c==null||c===false) continue;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return el;
}
function div(attrs,children) { return h("div",attrs,children); }
function p(attrs,children) { return h("p",attrs,children); }
function btn(attrs,children) { return h("button",attrs,children); }
function span(attrs,children) { return h("span",attrs,children); }

function scoreBar(label,value,max) {
  const pct=(value/max)*100;
  const color=pct>=80?"#3B6D11":pct>=50?"#B07D00":"#A32D2D";
  return div({style:{marginBottom:"7px"}},[
    div({style:{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"#556",marginBottom:"3px"}},[
      span({},label), span({style:{fontWeight:"600",color}},`${value}/${max}`)
    ]),
    div({style:{height:"6px",background:"#e0e0e0",borderRadius:"3px",overflow:"hidden"}},[
      div({style:{height:"100%",width:`${pct}%`,background:color,borderRadius:"3px",transition:"width 0.6s"}})
    ])
  ]);
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML="";

  const {phase,topic,dialogue,segIdx,segPhase,apiError,scores,elapsed,paused,ttsActive,retryCount,hasUrduVoice,contextPlayed,contextPlaying,customApiKey,customApiKeyInput,showKeyInput,showApiKey,keyError,micReady,micChecked,recording,audioUrl,micStatus,processing,transcript,segScore,voiceLevels} = state;

  const seg = dialogue?.segments[segIdx];
  const isEn = seg?.lang==="en";
  const progress = dialogue?((segIdx+(segPhase==="answered"?1:0))/dialogue.segments.length)*100:0;
  const PASS=63;

  // Header
  const header = div({style:{background:"#0f2744",padding:"13px 20px",display:"flex",alignItems:"center",gap:"11px"}},[
    span({style:{color:"#7ab8f5",fontSize:"18px"}},"📖"),
    span({style:{color:"#e8f1fb",fontWeight:"500",fontSize:"14px"}},"NAATI CCL · Urdu Mock Test Simulator"),
    phase==="test"?btn({style:{marginLeft:"auto",background:"transparent",border:"0.5px solid rgba(122,184,245,0.35)",borderRadius:"6px",color:"#7ab8f5",fontSize:"12px",padding:"4px 10px",cursor:"pointer"},onClick:restart},"↺ New Test"):null
  ].filter(Boolean));
  app.appendChild(header);

  const wrap = div({style:{maxWidth:"700px",margin:"0 auto",padding:"1.25rem 1rem 0"}});
  app.appendChild(wrap);

  // ── INPUT ──
  if(phase==="input") {
    const card = div({style:{background:"#fff",borderRadius:"12px",border:"1px solid #dde3ec",padding:"1.75rem",marginTop:"0.5rem"}});
    card.appendChild(p({style:{fontSize:"20px",fontWeight:"600",color:"#0f2744",marginBottom:"6px"}},"Start a Mock Test"));
    card.appendChild(p({style:{fontSize:"13px",color:"#556",marginBottom:"0.75rem",lineHeight:"1.65"}},"Enter a topic or pick randomly. Includes context briefing, real microphone recording, auto-transcription and AI scoring."));

    // Mic status
    if(!micChecked) {
      card.appendChild(div({style:{background:"#f5f7fa",borderRadius:"8px",padding:"10px 14px",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"8px",fontSize:"12px",color:"#778"}},[
        div({style:{width:"14px",height:"14px",border:"2px solid #dde3ec",borderTopColor:"#185FA5",borderRadius:"50%",animation:"spin 0.8s linear infinite",flexShrink:"0"}}),
        "Checking microphone access…"
      ]));
    } else if(micReady) {
      card.appendChild(div({style:{background:"#EAF3DE",borderRadius:"8px",padding:"10px 14px",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"8px",fontSize:"12px",color:"#27500A"}},[
        "✅ ",span({style:{fontWeight:"600"}},"Microphone ready")," — recording will work during the test."
      ]));
    } else {
      const micBox = div({style:{background:"#fdf2f2",border:"1px solid #f5c6c6",borderRadius:"8px",padding:"12px 14px",marginBottom:"1rem"}});
      micBox.appendChild(p({style:{fontSize:"13px",color:"#c0392b",fontWeight:"600",marginBottom:"6px"}},"🎙 Microphone permission needed"));
      micBox.appendChild(p({style:{fontSize:"12px",color:"#c0392b",marginBottom:"8px",lineHeight:"1.7"}},"1. Click the 🔒 lock icon in Chrome's address bar\n2. Set Microphone → Allow\n3. Click Reload"));
      micBox.appendChild(btn({style:{background:"#c0392b",border:"none",borderRadius:"6px",color:"#fff",fontSize:"12px",fontWeight:"500",padding:"7px 14px",cursor:"pointer"},onClick:async()=>{
        try{const s=await navigator.mediaDevices.getUserMedia({audio:true});s.getTracks().forEach(t=>t.stop());setState({micReady:true});}catch(e){}
      }},"🎙 Grant microphone access"));
      card.appendChild(micBox);
    }

    // Audio tip

      c.appendChild(p({style:{color:"#778",fontSize:"13px",marginBottom:"1.5rem"}},"No segments scored. Allow microphone and complete recordings for AI scoring."));
    }
    const brow=div({style:{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}});
    brow.appendChild(btn({style:{background:"#fff",border:"1px solid #ccd3dc",borderRadius:"8px",color:"#334",fontSize:"13px",padding:"9px 20px",cursor:"pointer"},onClick:()=>{state.topic="";restart();}},"↺ Change Topic"));
    brow.appendChild(btn({style:{background:"#185FA5",border:"none",borderRadius:"8px",color:"#fff",fontSize:"13px",fontWeight:"500",padding:"9px 20px",cursor:"pointer"},onClick:()=>{ setState({segIdx:0,segPhase:"idle",scores:{},audioBlob:null,audioUrl:null,transcript:"",segScore:null,phase:"test"}); resetTimer(); }},"▶ Retry Same Dialogue"));
    c.appendChild(brow);
    wrap.appendChild(c);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
if(window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged=checkVoices;
  checkVoices();
  setTimeout(checkVoices,800);
  setTimeout(checkVoices,2000);
}
initMic();
render();
</script>
</body>
</html>
